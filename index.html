<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manualidades Ale - Catálogo Online</title>
    <meta name="description" content="Tienda de manualidades y productos textiles artesanales. Compra en línea y realiza tu pedido por WhatsApp.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo-section">
                <img src="images/logo.png" alt="Manualidades Ale" class="logo">
            </div>
            <h1 class="title">Manualidades Ale</h1>
            <p class="subtitle">Tienda de manualidades y productos textiles artesanales</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <div class="content-wrapper">
                <!-- Catálogo -->
                <section class="catalog">
                    <h2 class="section-title">Nuestros Productos</h2>
                    <div class="products-grid" id="productsGrid">
                        <!-- Los productos se generan aquí con JavaScript -->
                    </div>
                </section>

                <!-- Carrito -->
                <aside class="cart-section">
                    <div class="cart-sticky">
                        <div class="cart-container" id="cartContainer">
                            <div class="cart-empty">
                                <p>Tu carrito está vacío. Selecciona productos para comenzar.</p>
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>¿Preguntas? Contáctanos por WhatsApp</p>
            <a href="https://wa.me/5434482557798" target="_blank" class="whatsapp-link">
                <span>💬</span> Escribir a WhatsApp
            </a>
            <p class="copyright">© 2026 Manualidades Ale. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="products.js"></script>
    <script src="app.js"></script>
</body>
</html>
